<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link rel="stylesheet" href="comopagar.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <script src="comopagar.js"></script>

    <nav class="nav">

        <img src="logo.png" class="logo">

        <div class="TextoNav">

            <input type="text" placeholder="Pesquisar..." class="pesquisa" onkeyup="pesquisar()">

            <a href="paginahome.html">
                <h3>Início</h3>
            </a>

            <a href="produtos.html">
                <h3>Produtos</h3>
            </a>

            <a href="sobre.html">
                <h3>Sobre</h3>
            </a>

            <a href="login.html">
                <img class="perfil" src="user.png">
            </a>

        </div>

    </nav>


    <section class="pagamento-area">

        <div class="esquerda">

            <h1>Escolha como pagar</h1>

            <div class="pagamento-box">

                <h3>Formas de pagamento</h3>

                <div class="linha"></div>


                <label class="opcao">

                    <div class="opcao-esquerda">

                        <input type="radio" name="pagamento" value="pix">

                        <img src="pixpreto.png">

                        <div>
                            <p class="titulo">Pix</p>
                            <span>Aprovação imediata</span>
                        </div>

                    </div>

                </label>


                <label class="opcao">

                    <div class="opcao-esquerda">

                        <input type="radio" name="pagamento" value="cartao">

                        <img src="cartaopreto.png">

                        <div>
                            <p class="titulo">Cartão</p>
                            <span>Débito ou Crédito</span>
                        </div>

                    </div>

                </label>

            </div>

            <button class="btn-continuar" onclick="continuarPagamento()">Continuar</button>

        </div>

        <div class="resumo">

            <h3>Resumo do pedido</h3>

            <div class="linha-resumo"></div>

            <div class="item">
               <p id="nomeProduto">Produto</p>
                <span id="valorProduto">R$0,00</span>
            </div>

            <div class="item">
                <p>Frete</p>
                <span>Grátis</span>
            </div>

            <div class="linha-resumo baixo"></div>

            <div class="item total">
               <p>Você pagará</p>
               <span id="valorTotal">R$0,00</span>
            </div>

        </div>

    </section>


     <footer>

        <div class="links-footer">

            <a href="sobre.html">Quem somos</a>
            <a href="#">Meu cadastro</a>
            <a href="#">Fale conosco</a>

        </div>

        <div class="footer-baixo">

            <div>

                <h4>Formas de pagamento</h4>

                <div class="pagamentos">
                    <img src="pagamento.png">
                </div>

            </div>

            <div>

                <h4>Redes sociais</h4>

            <div class="social">

             <a href="https://instagram.com" target="_blank"> <img src="insta.png"></a>

            </div>

            </div>

            <img src="logo.png" class="logo-footer">

        </div>

    </footer>


</body>

</html>
