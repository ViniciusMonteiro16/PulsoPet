<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <link rel="stylesheet" href="criarconta.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <script src="criarconta.js"></script>

    <nav class="nav">

        <img src="logo.png" class="logo">

        <div class="TextoNav">

            <a href="paginahome.html">
                <h3>Início</h3>
            </a>

            <a href="produtos.html">
                <h3>Produtos</h3>
            </a>

            <a href="sobre.html">
                <h3>Sobre</h3>
            </a>

            <a href="login.html">
                <img class="perfil" src="user.png">
            </a>

        </div>

    </nav>

    <section class="criar-area">

        <div class="criar-card">

            <img src="logo.png" class="logo-criar">

            <input type="email"
            placeholder="Email:"
            id="email">

            <input type="text"
            placeholder="Nome de usuário:"
            id="usuario">

            <div class="senha-area">

                <input type="password"
                placeholder="Senha:"
                id="senha">

                <span class="eye"
                onclick="mostrarSenha('senha')">
                </span>

            </div>

            <div class="senha-area">

                <input type="password"
                placeholder="Confirmar senha:"
                id="confirmar">

                <span class="eye"
                onclick="mostrarSenha('confirmar')">
                </span>

            </div>

            <button class="btn-entrar"
            onclick="criarConta()">
                Entrar
            </button>

        </div>

    </section>

     <footer>

        <div class="links-footer">

            <a href="sobre.html">Quem somos</a>
            <a href="#">Meu cadastro</a>
            <a href="#">Fale conosco</a>

        </div>

        <div class="footer-baixo">

            <div>

                <h4>Formas de pagamento</h4>

                <div class="pagamentos">
                    <img src="pagamento.png">
                </div>

            </div>

            <div>

                <h4>Redes sociais</h4>

            <div class="social">

             <a href="https://instagram.com" target="_blank"> <img src="insta.png"></a>

            </div>

            </div>

            <img src="logo.png" class="logo-footer">

        </div>

    </footer>



</body>

</html>
