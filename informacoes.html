<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações</title>

    <link rel="stylesheet" href="informacoes.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

<script src="informacoes.js"></script>

    <nav class="nav">

        <img src="logo.png" class="logo">

        <div class="TextoNav">

            <a href="paginahome.html">
                <h3>Início</h3>
            </a>

            <a href="produtos.html">
                <h3>Produtos</h3>
            </a>

            <a href="sobre.html">
                <h3>Sobre</h3>
            </a>

            <a href="login.html">
                <img src="user.png" class="perfil">
            </a>

        </div>

    </nav>


    <section class="area-info">

        <h1>Preencha suas informações</h1>

        <div class="card-info">

            <input type="text"
            placeholder="Nome completo"
            id="nome">

            <input type="text"
            placeholder="CEP"
            id="cep">

            <input type="text"
            placeholder="Número de telefone"
            id="telefone">

            <input type="text"
            placeholder="Endereço"
            id="endereco">

        </div>

        <button class="btn-continuar"
        onclick="continuarPagamento()">

            Continuar

        </button>

    </section>


    <footer>

        <div class="links-footer">

            <a href="sobre.html">Quem somos</a>
            <a href="#">Meu cadastro</a>
            <a href="#">Fale conosco</a>

        </div>

        <div class="footer-baixo">

            <div>

                <h4>Formas de pagamento</h4>

                <div class="pagamentos">
                    <img src="pagamento.png">
                </div>

            </div>

            <div>

                <h4>Redes sociais</h4>

                <div class="social">

                    <a href="https://instagram.com"
                    target="_blank">

                        <img src="insta.png">

                    </a>

                </div>

            </div>

            <img src="logo.png" class="logo-footer">

        </div>

    </footer>
